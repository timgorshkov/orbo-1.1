user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Extended log format with upstream timing and Next-Action tracking
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'na="$http_next_action" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Max body size (500M for Telegram history import)
    client_max_body_size 500M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-font-ttf
               font/opentype image/svg+xml;
    gzip_min_length 1000;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Aggressive rate-limit for requests with Next-Action header (scanner mitigation).
    # When $http_next_action is empty, the key is "" — nginx skips it,
    # so the rate limit only applies when the header is present.
    map $http_next_action $next_action_ratelimit_key {
        default "";
        "~."    $binary_remote_addr;
    }
    limit_req_zone $next_action_ratelimit_key zone=server_action:10m rate=2r/s;

    # Block suspicious Next-Action values at nginx level.
    # Valid Next-Action IDs are always exactly 40 hex characters.
    # Anything else (e.g. "dontcare", "r", random strings) is a scanner probe.
    map $http_next_action $block_next_action {
        default             0;          # no header — allow
        "~^[0-9a-f]{40}$"  0;          # valid 40-char hex — allow
        "~."                1;          # header present but invalid — block
    }

    # Upstream - Next.js application
    upstream nextjs {
        server app:3000;
        keepalive 32;
    }

    # =========================================================================
    # HTTP -> HTTPS redirect for all domains
    # =========================================================================
    server {
        listen 80;
        server_name my.orbo.ru app.orbo.ru orbo.ru www.orbo.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # app.orbo.ru -> my.orbo.ru redirect
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name app.orbo.ru;

        ssl_certificate /etc/letsencrypt/live/app.orbo.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.orbo.ru/privkey.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_protocols TLSv1.2 TLSv1.3;

        return 301 https://my.orbo.ru$request_uri;
    }

    # =========================================================================
    # www.orbo.ru -> orbo.ru redirect
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name www.orbo.ru;

        ssl_certificate /etc/letsencrypt/live/orbo.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/orbo.ru/privkey.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_protocols TLSv1.2 TLSv1.3;

        return 301 https://orbo.ru$request_uri;
    }

    # =========================================================================
    # orbo.ru - Public Website
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name orbo.ru;

        ssl_certificate /etc/letsencrypt/live/orbo.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/orbo.ru/privkey.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Connection limits
        limit_conn conn 20;

        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # =========================================================================
    # my.orbo.ru - Main Application
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name my.orbo.ru;

        ssl_certificate /etc/letsencrypt/live/my.orbo.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/my.orbo.ru/privkey.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Connection limits
        limit_conn conn 20;

        # ----- Telegram import history - large files, long processing -----
        location /api/telegram/import-history/ {
            limit_req zone=api burst=5 nodelay;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            client_max_body_size 500M;
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # ----- Telegram webhook - longer timeout -----
        location /api/telegram/webhook {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
        }

        # ----- API routes - rate limiting -----
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ----- Static files - aggressive caching -----
        location /_next/static/ {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ----- Next.js image optimization -----
        location /_next/image {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            expires 7d;
            add_header Cache-Control "public";
        }

        # ----- All other requests -----
        location / {
            limit_req zone=general burst=50 nodelay;
            limit_req zone=server_action burst=5 nodelay;

            # Block scanner probes: Next-Action header present but not valid 40-char hex
            if ($block_next_action = 1) {
                return 400;
            }

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
